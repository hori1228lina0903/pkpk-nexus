<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Infernape ex</title>
  <link href="/styles/base.css" rel="stylesheet"/>
  <link href="/styles/deck.css" rel="stylesheet"/>
  <link href="/styles/header-footer.css" rel="stylesheet"/>
</head>
<body class="sets-page">
  <div id="header"></div>

  <nav class="breadcrumbs">
    <a href="/">Home</a>
    <a href="/decks.html">Decks</a>
    <a href="/decks/Infernape_ex.html">Infernape ex</a>
  </nav>
  
  <main class="page-main">
    <div class="section">
      <h1 class="main-title">
        Infernape ex
      </h1>
    </div>

    <div class="deck-container">
      <img src="/images/deck_images/Infernape ex.webp" alt="Infernape ex image"/>
      <div class="overlay-text">Infernape ex</div>
    </div>

    <div class="section">
      <div class="content">
        <div class="subheading">
          <h2>Contents</h2>
        </div>
        
        <div class="toc-container">
          <ol>
            <li><a href="#Deck1">Deck1</a></li>
            <li><a href="#Deck2">Deck2</a></li>
            <li><a href="#Deck3">Deck3</a></li>
          </ol>
        </div>
      </div>
    </div>

    <!-- デッキリスト -->
    <div class="section" id="Deck1">
      <div class="content">
        <div class="subheading">
          <h2>Deck List</h2>
        </div>
        
        <table class="energy-table">
          <tr>
            <th>Energy</th>
            <td>
              <div class="energy-item">
                <img src="/images/energy/psychic.webp" alt="Psychic Energy" class="energy-icon">
              </div>
            </td>
          </tr>
        </table>
        
        <div class="deck-list-grid">
          <div class="deck-card">
            <a href="#" class="card-link">
              <img src="/images/cards/placeholder.webp" alt="Card">
              <span class="card-count">×2</span>
            </a>
          </div>
        </div>

        <!-- デッキの特徴 -->
        <ol class="deck-features">
          <li>Feature point 1</li>
          <li>Feature point 2</li>
          <li>Feature point 3</li>
        </ol>
        
        <!-- Tech Choices -->
        <h4>Tech Choices</h4>
        <div class="tech-substitution-container">
          <div class="substitution-row">
            <div class="substitution-visual">
              <div class="card-out">
                <a href="#" class="card-link">
                  <img src="/images/cards/placeholder.webp" alt="Out Card">
                </a>
                <span class="label-out">OUT</span>
              </div>
              <div class="substitution-arrow">→</div>
              <div class="card-in">
                <a href="#" class="card-link">
                  <img src="/images/cards/placeholder.webp" alt="In Card">
                </a>
                <span class="label-in">IN</span>
              </div>
            </div>
            <div class="substitution-desc">
              Description of this tech choice.
            </div>
          </div>
        </div>
        
      </div>
    </div>

  </main>

  <div id="footer"></div>
  <script src="/js/header-footer-load.js"></script>
  <script src="/js/series-toggle.js"></script>
</body>
</html>
